<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Movie Player</title>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; font-size: 16px; }
        input[type="text"] { width: 250px; }
        button { background-color: #63b8bc; color: black; font-weight: bold; cursor: pointer; }
        .player-box { margin-top: 20px; position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 8px; }
        /* Style the iframe element directly to fit our wrapper box */
        .player-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Custom Studio Stream</h1>
    
    <div>
        <input type="text" id="tmdbIdInput" placeholder="Enter Movie TMDb ID" value="15137">
        <button onclick="loadVideo()">Load Movie</button>
    </div>

    <!-- The container wrapper box stays, but we will inject the iframe dynamically -->
    <div class="player-box" id="playerWrapper"></div>
</div>

<script>
    function loadVideo() {
        const tmdbId = document.getElementById('tmdbIdInput').value.trim();
        if (!tmdbId) {
            alert("Please enter a valid numeric TMDb ID code!");
            return;
        }
        
        const mainSite = "https://vidlink.pro";
        const movieFolder = "/movie/";
        let finalUrl = mainSite + movieFolder + tmdbId;
        
        if (tmdbId === "15137") {
            // Your exact live subtitle file link hosted securely on your GitHub domain
            const subFileUrl = "https://github.io";
            finalUrl = finalUrl + "?sub=" + encodeURIComponent(subFileUrl) + "&sub_lang=English_Custom";
        }
        
        // FIX: Completely wipe out the player box and rebuild the iframe from scratch.
        // This forces VidLink's engine to read your subtitle link the exact millisecond it wakes up!
        const wrapper = document.getElementById('playerWrapper');
        wrapper.innerHTML = ""; // Clear old player frame
        
        const newIframe = document.createElement('iframe');
        newIframe.src = finalUrl;
        newIframe.setAttribute('allowfullscreen', 'true');
        
        wrapper.appendChild(newIframe);
    }
</script>

</body>
</html>
